name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Fast Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP (incremental sync)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          server-dir: /domains/fisora.shop/public_html/

          # 🔥 THIS is what makes it FAST
          state-name: .ftp-deploy-state.json

          # 🚫 DO NOT upload heavy/repeated folders
          exclude: |
            **/vendor/**
            **/.git*
            **/.github/**
            **/.vscode/**
            **/.idea/**
            **/node_modules/**
            **/tests/**
            **/.env*
            storage/logs/**
            storage/framework/cache/**
            storage/framework/sessions/**
            storage/framework/views/**
            README.md
            .gitignore
            .editorconfig
            phpunit.xml