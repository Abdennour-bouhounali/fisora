name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Checkout Repository
      uses: actions/checkout@v4

    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        coverage: none

    - name: 📦 Install Composer Dependencies
      run: |
        composer install \
          --no-dev \
          --prefer-dist \
          --optimize-autoloader \
          --no-interaction

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🛠️ Install NPM Dependencies
      run: npm ci

    - name: 🏗️ Build Assets
      run: npm run build

    - name: 📂 Deploy to Hostinger FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        protocol: ftp
        server-dir: /public_html/
        exclude: |
          **/.git*
          **/.git*/**
          **/.github/**
          **/node_modules/**
          **/tests/**
          **/.env
          **/.env.*
          storage/logs/**
          README.md
          .editorconfig
          .gitattributes
          .gitignore
